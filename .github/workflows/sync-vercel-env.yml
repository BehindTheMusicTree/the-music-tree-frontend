# Sync environment variables from GitHub to Vercel (Production and Preview).
# Run manually: Actions → Sync Vercel env → Run workflow.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN — Vercel → Account Settings → Tokens → Create
#     https://vercel.com/account/tokens (scope must allow managing this project’s env)
#   VERCEL_PROJECT_ID — Vercel → Project → Settings → General → Project ID
#
# Required per GitHub Environment (production, staging), Variables tab:
#   DOMAIN_NAME, HTMT_API_SUBDOMAIN, GTMT_FRONT_SUBDOMAIN, AUDIOMETA_SUBDOMAIN, MASTODON_URL
#   BREVO_NEWSLETTER_LIST_ID, BREVO_DOI_TEMPLATE_ID, BREVO_DOI_REDIRECT_PATH (e.g. /newsletter/confirmed; app builds https://DOMAIN_NAME + path for Brevo)
# Required per environment, Secrets tab (or repository secrets): BREVO_API_KEY (synced to Vercel as type sensitive)
# Sync derives NEXT_PUBLIC_SITE_ORIGIN on Vercel as https:// + vars.DOMAIN_NAME (no separate GitHub variable).
# DOMAIN_NAME is also written to Vercel as ORG_URL (Website Carbon report link; same value).
name: Sync Vercel env

on:
  workflow_dispatch:

jobs:
  sync-production:
    name: Sync to Vercel production
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
      HTMT_API_SUBDOMAIN: ${{ vars.HTMT_API_SUBDOMAIN }}
      GTMT_FRONT_SUBDOMAIN: ${{ vars.GTMT_FRONT_SUBDOMAIN }}
      AUDIOMETA_SUBDOMAIN: ${{ vars.AUDIOMETA_SUBDOMAIN }}
      MASTODON_URL: ${{ vars.MASTODON_URL }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      BREVO_NEWSLETTER_LIST_ID: ${{ vars.BREVO_NEWSLETTER_LIST_ID }}
      BREVO_DOI_TEMPLATE_ID: ${{ vars.BREVO_DOI_TEMPLATE_ID }}
      BREVO_DOI_REDIRECT_PATH: ${{ vars.BREVO_DOI_REDIRECT_PATH }}
    steps:
      - name: Validate required env vars
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ] && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          [ -z "$DOMAIN_NAME" ] && missing="$missing DOMAIN_NAME"
          [ -z "$HTMT_API_SUBDOMAIN" ] && missing="$missing HTMT_API_SUBDOMAIN"
          [ -z "$GTMT_FRONT_SUBDOMAIN" ] && missing="$missing GTMT_FRONT_SUBDOMAIN"
          [ -z "$AUDIOMETA_SUBDOMAIN" ] && missing="$missing AUDIOMETA_SUBDOMAIN"
          [ -z "$MASTODON_URL" ] && missing="$missing MASTODON_URL"
          [ -z "$BREVO_API_KEY" ] && missing="$missing BREVO_API_KEY"
          [ -z "$BREVO_NEWSLETTER_LIST_ID" ] && missing="$missing BREVO_NEWSLETTER_LIST_ID"
          [ -z "$BREVO_DOI_TEMPLATE_ID" ] && missing="$missing BREVO_DOI_TEMPLATE_ID"
          [ -z "$BREVO_DOI_REDIRECT_PATH" ] && missing="$missing BREVO_DOI_REDIRECT_PATH"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty (repo secrets or production env vars):$missing"
            exit 1
          fi
          case "$BREVO_DOI_REDIRECT_PATH" in
            /*) ;;
            *)
              echo "::error::BREVO_DOI_REDIRECT_PATH must start with / (got: $BREVO_DOI_REDIRECT_PATH)"
              exit 1
              ;;
          esac
          echo "All required env vars are set."

      - name: Sync to Vercel production
        run: |
          set -e
          sync_var() {
            local value="$1"
            local key="$2"
            local vtype="${3:-plain}"
            [ -z "$value" ] && return 0
            echo "Syncing $key to production..."
            body=$(jq -n --arg key "$key" --arg value "$value" --arg vtype "$vtype" \
              '{key:$key, value:$value, type:$vtype, target:["production"]}')
            curl -sS -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?upsert=true" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$body"
          }
          sync_var "$DOMAIN_NAME" "DOMAIN_NAME"
          sync_var "$DOMAIN_NAME" "ORG_URL"
          sync_var "https://${DOMAIN_NAME}" "NEXT_PUBLIC_SITE_ORIGIN"
          sync_var "$HTMT_API_SUBDOMAIN" "HTMT_API_SUBDOMAIN"
          sync_var "$GTMT_FRONT_SUBDOMAIN" "GTMT_FRONT_SUBDOMAIN"
          sync_var "$AUDIOMETA_SUBDOMAIN" "AUDIOMETA_SUBDOMAIN"
          sync_var "$MASTODON_URL" "MASTODON_URL"
          sync_var "$BREVO_API_KEY" "BREVO_API_KEY" "sensitive"
          sync_var "$BREVO_NEWSLETTER_LIST_ID" "BREVO_NEWSLETTER_LIST_ID"
          sync_var "$BREVO_DOI_TEMPLATE_ID" "BREVO_DOI_TEMPLATE_ID"
          sync_var "$BREVO_DOI_REDIRECT_PATH" "BREVO_DOI_REDIRECT_PATH"
          echo "Production sync done."

  sync-staging:
    name: Sync to Vercel preview (staging)
    runs-on: ubuntu-latest
    environment: staging
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
      HTMT_API_SUBDOMAIN: ${{ vars.HTMT_API_SUBDOMAIN }}
      GTMT_FRONT_SUBDOMAIN: ${{ vars.GTMT_FRONT_SUBDOMAIN }}
      AUDIOMETA_SUBDOMAIN: ${{ vars.AUDIOMETA_SUBDOMAIN }}
      MASTODON_URL: ${{ vars.MASTODON_URL }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      BREVO_NEWSLETTER_LIST_ID: ${{ vars.BREVO_NEWSLETTER_LIST_ID }}
      BREVO_DOI_TEMPLATE_ID: ${{ vars.BREVO_DOI_TEMPLATE_ID }}
      BREVO_DOI_REDIRECT_PATH: ${{ vars.BREVO_DOI_REDIRECT_PATH }}
    steps:
      - name: Validate required env vars
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ] && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          [ -z "$DOMAIN_NAME" ] && missing="$missing DOMAIN_NAME"
          [ -z "$HTMT_API_SUBDOMAIN" ] && missing="$missing HTMT_API_SUBDOMAIN"
          [ -z "$GTMT_FRONT_SUBDOMAIN" ] && missing="$missing GTMT_FRONT_SUBDOMAIN"
          [ -z "$AUDIOMETA_SUBDOMAIN" ] && missing="$missing AUDIOMETA_SUBDOMAIN"
          [ -z "$MASTODON_URL" ] && missing="$missing MASTODON_URL"
          [ -z "$BREVO_API_KEY" ] && missing="$missing BREVO_API_KEY"
          [ -z "$BREVO_NEWSLETTER_LIST_ID" ] && missing="$missing BREVO_NEWSLETTER_LIST_ID"
          [ -z "$BREVO_DOI_TEMPLATE_ID" ] && missing="$missing BREVO_DOI_TEMPLATE_ID"
          [ -z "$BREVO_DOI_REDIRECT_PATH" ] && missing="$missing BREVO_DOI_REDIRECT_PATH"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty (repo secrets or staging env vars):$missing"
            exit 1
          fi
          case "$BREVO_DOI_REDIRECT_PATH" in
            /*) ;;
            *)
              echo "::error::BREVO_DOI_REDIRECT_PATH must start with / (got: $BREVO_DOI_REDIRECT_PATH)"
              exit 1
              ;;
          esac
          echo "All required env vars are set."

      - name: Sync to Vercel preview
        run: |
          set -e
          sync_var() {
            local value="$1"
            local key="$2"
            local vtype="${3:-plain}"
            [ -z "$value" ] && return 0
            echo "Syncing $key to preview..."
            body=$(jq -n --arg key "$key" --arg value "$value" --arg vtype "$vtype" \
              '{key:$key, value:$value, type:$vtype, target:["preview"]}')
            curl -sS -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?upsert=true" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$body"
          }
          sync_var "$DOMAIN_NAME" "DOMAIN_NAME"
          sync_var "$DOMAIN_NAME" "ORG_URL"
          sync_var "https://${DOMAIN_NAME}" "NEXT_PUBLIC_SITE_ORIGIN"
          sync_var "$HTMT_API_SUBDOMAIN" "HTMT_API_SUBDOMAIN"
          sync_var "$GTMT_FRONT_SUBDOMAIN" "GTMT_FRONT_SUBDOMAIN"
          sync_var "$AUDIOMETA_SUBDOMAIN" "AUDIOMETA_SUBDOMAIN"
          sync_var "$MASTODON_URL" "MASTODON_URL"
          sync_var "$BREVO_API_KEY" "BREVO_API_KEY" "sensitive"
          sync_var "$BREVO_NEWSLETTER_LIST_ID" "BREVO_NEWSLETTER_LIST_ID"
          sync_var "$BREVO_DOI_TEMPLATE_ID" "BREVO_DOI_TEMPLATE_ID"
          sync_var "$BREVO_DOI_REDIRECT_PATH" "BREVO_DOI_REDIRECT_PATH"
          echo "Preview sync done."
